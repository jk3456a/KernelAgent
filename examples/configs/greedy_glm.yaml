# Greedy strategy driven by GLM-5.2 (llm-center), for remote-execution smoke runs.

strategy: greedy
num_workers: 1
strategy_config:
  max_no_improvement: 5
openai_model: glm-5.2
high_reasoning_effort: false

# Worker configuration
benchmark_warmup: 5
benchmark_repeat: 20
divergence_threshold: 50.0
target_platform: cuda
gpu_name: "NVIDIA H100 NVL 94GB"
