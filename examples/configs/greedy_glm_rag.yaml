# Greedy GLM-5.2 strategy augmented with optimization-pattern retrieval.
# Load ZAI_API_KEY before starting this strategy.

strategy: greedy
num_workers: 1
strategy_config:
  max_no_improvement: 5
openai_model: glm-5.2
high_reasoning_effort: false

# Worker configuration
benchmark_warmup: 5
benchmark_repeat: 20
divergence_threshold: 50.0
target_platform: cuda
gpu_name: "NVIDIA H100 SXM 80GB"
use_rag: true
rag_embedding:
  backend: openai_compatible
  options:
    model: embedding-3
    dimensions: 2048
    api_key_env: ZAI_API_KEY
    base_url: https://open.bigmodel.cn/api/paas/v4/
    encoding_format: float
